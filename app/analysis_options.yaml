include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    # Allow TODO comments without failing analysis.
    todo: ignore
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"

linter:
  rules:
    prefer_single_quotes: true
    avoid_print: false
    prefer_const_constructors: true
    prefer_final_locals: true
