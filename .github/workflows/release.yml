name: Release

# On every main push or manual run: build every supported native platform,
# upload downloadable artifacts, and deploy the web app to the `web` branch.
# On a version tag (v*): additionally publish those artifacts as a GitHub Release.
#
# Trigger a full release: git tag v1.0.0 && git push origin v1.0.0
#
# GitHub Pages: enable Settings → Pages → Source = branch `web` (root). With the
# repo served at majianyu2007.github.io/nwafu-bksxk/ (and the js.org custom domain
# on the user's Pages site), the landing page is at
# https://mjy.js.org/nwafu-bksxk/ and the web app at .../nwafu-bksxk/app/.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write # create releases + push to the web branch

env:
  FLUTTER_VERSION: "3.44.6"
  IS_TAG: ${{ startsWith(github.ref, 'refs/tags/v') }}

jobs:
  # ---- Native platform builds --------------------------------------------------
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - run: flutter pub get
      - run: flutter build apk --release
      - run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/nwafu-bksxk-android.apk
      - uses: actions/upload-artifact@v4
        with: { name: android, path: dist/* }

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Package .dmg (fallback to zip)
        run: |
          mkdir -p dist
          APP=$(find build/macos/Build/Products/Release -maxdepth 1 -name "*.app" | head -1)
          hdiutil create -volname "西农本科选课" -srcfolder "$APP" -ov -format UDZO dist/nwafu-bksxk-macos.dmg || \
            (cd "$(dirname "$APP")" && zip -r -y "$GITHUB_WORKSPACE/dist/nwafu-bksxk-macos.zip" "$(basename "$APP")")
      - uses: actions/upload-artifact@v4
        with: { name: macos, path: dist/* }

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release
      - run: |
          mkdir dist
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath dist/nwafu-bksxk-windows.zip
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with: { name: windows, path: dist/* }

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            libsecret-1-dev
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - run: flutter pub get
      - run: flutter build linux --release
      - run: |
          mkdir -p dist
          tar -C build/linux/x64/release/bundle -czf dist/nwafu-bksxk-linux.tar.gz .
      - uses: actions/upload-artifact@v4
        with: { name: linux, path: dist/* }

  # ---- Release (only on a version tag) ----------------------------------------
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-android, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          name: ${{ github.ref_name }}
          body: |
            西农本科选课 ${{ github.ref_name }}

            下载对应平台的安装包。网页版：https://mjy.js.org/nwafu-bksxk/
            本系统仅在校园网内可用（校外需 VPN 接入校园网）。

  # ---- Web build + deploy to the `web` branch (on main push AND tags) ---------
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      # web/ is committed (custom index.html + bundled onnxruntime-web for OCR).
      - run: flutter pub get
      - run: flutter build web --release --base-href /nwafu-bksxk/app/
      - name: Assemble site (landing at /, web app under /app/, userscript, 404)
        run: |
          mkdir -p public/app
          cp -r site/* public/
          cp -r build/web/* public/app/
          cp web_bridge/bksxk-web-bridge.user.js public/bksxk-web-bridge.user.js
          # SPA fallback so deep links to the app resolve.
          cp public/index.html public/404.html
      - name: Deploy to web branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: web
          force_orphan: true
          commit_message: "Deploy web: ${{ github.sha }}"
