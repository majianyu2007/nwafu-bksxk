name: nwafu_bksxk
description: >-
  西农本科选课 · A fast, cross-platform NWAFU (bksxk.nwafu.edu.cn) course
  selection and auto-grab client.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  # State management
  flutter_riverpod: ^2.5.1
  # Networking
  dio: ^5.4.3+1
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1
  # Persistence
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  path: ^1.9.0
  # Background & notifications
  flutter_local_notifications: ^17.1.2
  # Captcha OCR: on-device ONNX inference (android/ios/macos/windows/linux).
  flutter_onnxruntime: ^1.8.0
  image: ^4.2.0
  # UI niceties
  dynamic_color: ^1.7.0
  cupertino_icons: ^1.0.6
  # Web-only: read the companion userscript's install flag (tree-shaken off web).
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  test: ^1.25.0

flutter:
  uses-material-design: true

  # Bundled captcha OCR model (ONNX) + its charset, loaded on-device.
  assets:
    - assets/models/

  # Fonts are bundled (a GB2312/GBK subset of Noto Sans SC, OFL 1.1) so the app
  # renders Chinese offline and only ever connects to bksxk.nwafu.edu.cn — no
  # font CDN at runtime.
  fonts:
    - family: NotoSansSC
      fonts:
        - asset: assets/fonts/NotoSansSC-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSansSC-Medium.ttf
          weight: 500
